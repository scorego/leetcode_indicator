<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>LeetCode Indicator - 程序员市场趋势</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.3.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    :root{
      --bg:#f3f7fb;
      --card:#ffffff;
      --muted:#6b7280;
      --accent:#2563eb;
      --border:rgba(15,23,42,0.08);
      --soft:#eef4fb;
      --glass: rgba(255,255,255,0.7);
    }

    *{box-sizing:border-box}
    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
      margin: 0;
      padding: 28px;
      background: linear-gradient(180deg,#f7fbff 0%, var(--bg) 100%);
      color: #0f172a;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), var(--card));
      padding: 26px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(16,24,40,0.06);
      border: 1px solid rgba(16,24,40,0.04);
    }
    h1 {
      text-align: center;
      color: #0b1220;
      margin: 6px 0 4px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .description {
      text-align: center;
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 14px;
    }
    .summary-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin:18px 0; }
    .summary-item { border:1px solid var(--border); border-radius:8px; padding:12px 14px; background:#fbfdff; min-height:78px; }
    .summary-label { color:var(--muted); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .summary-value { margin-top:7px; font-size:22px; font-weight:700; color:#111827; line-height:1.15; }
    .summary-note { margin-top:5px; color:var(--muted); font-size:12px; line-height:1.35; overflow-wrap:anywhere; }
    .summary-value.positive { color:#047857; }
    .summary-value.negative { color:#b91c1c; }
    .toolbar { display:flex; flex-wrap:wrap; justify-content:space-between; gap:12px; align-items:center; margin:10px 0 14px; padding:12px; border:1px solid var(--border); border-radius:10px; background:#fbfdff; }
    .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .control-item{ display:inline-flex; align-items:center; gap:7px; }
    label{ font-weight:600; color:var(--muted); font-size:13px }
    select, input{ padding:8px 10px; border-radius:8px; border:1px solid var(--border); background:#fff; min-height:36px; box-shadow:0 1px 2px rgba(16,24,40,0.03); }
    select{ min-width:142px; }
    button{ padding:8px 12px; border-radius:8px; border:none; cursor:pointer; background:var(--accent); color:white; font-weight:600; transition:transform .12s ease, box-shadow .12s ease }
    button:hover{ transform:translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,0.12) }
    button.secondary{ background:#ffffff; color:var(--accent); border:1px solid rgba(37,99,235,0.08); box-shadow: 0 2px 6px rgba(16,24,40,0.03) }
    .chart-container { position:relative; height:460px; margin-bottom:18px; border-radius:12px; padding:14px; background:linear-gradient(180deg, rgba(255,255,255,0.6), rgba(250,252,255,0.6)); border: 1px solid rgba(15,23,42,0.03) }
    .overview-container{ height:110px; margin-top:10px; border-radius:8px; padding:8px; background:transparent }
    .chart-empty { position:absolute; inset:14px; display:none; align-items:center; justify-content:center; text-align:center; padding:24px; color:var(--muted); background:rgba(255,255,255,.86); border:1px dashed var(--border); border-radius:10px; z-index:2; }
    .chart-empty strong { display:block; color:#111827; margin-bottom:6px; font-size:16px; }
    canvas{ max-width:100%; }
    .subtitle { text-align:center; color:var(--muted); margin-top:6px; font-size:13px }

    /* event chips */
    .events-panel { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; margin:0 0 16px; padding:10px 12px; border:1px solid var(--border); border-radius:10px; background:#fff; }
    .event-form { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .event-title-input { min-width:240px; }
    .event-chip { display:inline-flex; align-items:center; gap:8px; padding:6px 10px; background:var(--soft); border-radius:999px; border:1px solid rgba(15,23,42,0.05); margin-right:8px; margin-bottom:6px; font-size:13px }
    .event-chip .chip-time { color:var(--muted); font-weight:600 }
    .chip-delete { background:transparent; border:none; color:var(--muted); cursor:pointer; padding:2px 6px; border-radius:6px }
    .chip-delete:hover { background:rgba(0,0,0,0.04) }
    .events-list { display:flex; flex-wrap:wrap; gap:8px; align-items:center; max-height:140px; overflow:auto; padding:6px 0 }
    .more-chip { padding:6px 10px; border-radius:999px; background:linear-gradient(90deg, #fff, #fbfdff); border:1px dashed rgba(15,23,42,0.06); color:var(--muted); cursor:pointer }
    @media (max-width:840px){ .summary-grid{grid-template-columns:repeat(2,minmax(0,1fr));} .toolbar,.events-panel{align-items:stretch;} }
    @media (max-width:720px){ body{padding:14px}.container{padding:18px}.summary-grid{grid-template-columns:1fr}.controls,.actions,.event-form{width:100%}.control-item{width:100%; justify-content:space-between} select,input,.event-title-input{width:100%; min-width:0}.chart-container{height:320px} }
  </style>
</head>
<body>
  <div class="container">
    <h1>LeetCode Indicator</h1>
    <p class="description">通过LeetCode题目在线人数反映程序员市场趋势</p>
    
    <div class="summary-grid" aria-live="polite">
      <div class="summary-item">
        <div id="summaryLatestLabel" class="summary-label">Latest</div>
        <div id="summaryLatestValue" class="summary-value">--</div>
        <div id="summaryLatestNote" class="summary-note">--</div>
      </div>
      <div class="summary-item">
        <div id="summaryTotalLabel" class="summary-label">Online users</div>
        <div id="summaryTotalValue" class="summary-value">--</div>
        <div id="summaryTotalNote" class="summary-note">--</div>
      </div>
      <div class="summary-item">
        <div id="summaryChangeLabel" class="summary-label">Change</div>
        <div id="summaryChangeValue" class="summary-value">--</div>
        <div id="summaryChangeNote" class="summary-note">--</div>
      </div>
      <div class="summary-item">
        <div id="summarySamplesLabel" class="summary-label">Samples</div>
        <div id="summarySamplesValue" class="summary-value">--</div>
        <div id="summarySamplesNote" class="summary-note">--</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="controls">
        <div class="control-item">
          <label for="language">Language：</label>
          <select id="language" onchange="changeLanguage()">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
        <div class="control-item">
          <label for="site">站点：</label>
          <select id="site" onchange="updateChart()">
            <option value="us">LeetCode US</option>
            <option value="cn" selected>LeetCode China</option>
            <option value="all">全部</option>
          </select>
        </div>
        <div class="control-item">
          <label for="timezone">时区：</label>
          <select id="timezone" onchange="updateChart()">
            <option value="utc">UTC</option>
            <option value="pt">PT (UTC-8)</option>
            <option value="utc8" selected>UTC+8</option>
          </select>
        </div>
        <div class="control-item">
          <label for="timeDimension">时间维度：</label>
          <select id="timeDimension" onchange="updateChart()">
            <option value="hour">小时级别</option>
            <option value="day" selected>天级别（最大值）</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button id="screenshotBtn" class="secondary" onclick="takeScreenshot()">Screenshot</button>
      </div>
    </div>
    <div class="events-panel">
      <div class="event-form">
        <input id="eventDatetime" type="datetime-local" />
        <input id="eventTitle" class="event-title-input" placeholder="" />
        <button id="addEventBtn" onclick="addEventFromForm()">Add Event</button>
      </div>
      <div id="eventsList" style="font-size:13px;color:var(--muted)"></div>
    </div>
    
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
      <div id="chartEmptyState" class="chart-empty"></div>
    </div>
    <div class="chart-container overview-container" style="height:100px; margin-top:10px;">
      <canvas id="overviewChart"></canvas>
      <div style="text-align:right; margin-top:6px;">
        <button id="resetRangeBtn" class="secondary" onclick="resetRange()">Reset Range</button>
      </div>
    </div>
  </div>

  <script>
    function withCacheBust(url) {
      const separator = url.includes('?') ? '&' : '?';
      return `${url}${separator}v=${Date.now()}`;
    }

    async function fetchFreshJson(url) {
      return fetch(withCacheBust(url), {
        cache: 'no-store',
        headers: {
          'Cache-Control': 'no-cache'
        }
      });
    }

    function getTimezoneOffsetMs(timezone) {
      switch (timezone) {
        case 'pt':
          return -8 * 60 * 60 * 1000;
        case 'utc8':
          return 8 * 60 * 60 * 1000;
        case 'utc':
        default:
          return 0;
      }
    }

    function formatTimestamp(isoString, timezone) {
      const adjusted = new Date(new Date(isoString).getTime() + getTimezoneOffsetMs(timezone));
      const pad = n => String(n).padStart(2, '0');
      return `${adjusted.getFullYear()}-${pad(adjusted.getMonth() + 1)}-${pad(adjusted.getDate())} ${pad(adjusted.getHours())}:${pad(adjusted.getMinutes())}`;
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString();
    }

    function getUsableSamples(data) {
      const seen = new Set();
      return data
        .filter(item => item && item.timestamp && Array.isArray(item.problems) && item.problems.length > 0)
        .filter(item => {
          const key = `${item.site || 'unknown'}|${item.timestamp}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
    }

    function sumProblems(samples) {
      return samples.reduce((sum, item) => {
        return sum + item.problems.reduce((innerSum, problem) => innerSum + Number(problem.online_users || 0), 0);
      }, 0);
    }

    function getProblemNames(data) {
      const names = [];
      const seen = new Set();
      data.forEach(item => {
        (item.problems || []).forEach(problem => {
          if (!seen.has(problem.name)) {
            seen.add(problem.name);
            names.push(problem.name);
          }
        });
      });
      return names;
    }

    function setChartEmptyState(message, detail) {
      const emptyState = document.getElementById('chartEmptyState');
      const overview = document.querySelector('.overview-container');
      if (!emptyState) return;

      if (message) {
        emptyState.innerHTML = `<div><strong>${message}</strong><span>${detail || ''}</span></div>`;
        emptyState.style.display = 'flex';
        if (overview) overview.style.display = 'none';
      } else {
        emptyState.innerHTML = '';
        emptyState.style.display = 'none';
        if (overview) overview.style.display = '';
      }
    }

    function updateSummary(data, site, timezone) {
      const language = document.getElementById('language') ? document.getElementById('language').value : 'en';
      const lang = translations[language] || translations.en;
      const samples = getUsableSamples(data);
      const siteLabel = site === 'all' ? lang.siteAll : (site === 'cn' ? lang.siteCN : lang.siteUS);

      if (samples.length === 0) {
        document.getElementById('summaryLatestValue').textContent = '--';
        document.getElementById('summaryLatestNote').textContent = lang.noUsableSamples;
        document.getElementById('summaryTotalValue').textContent = '--';
        document.getElementById('summaryTotalNote').textContent = siteLabel;
        document.getElementById('summaryChangeValue').textContent = '--';
        document.getElementById('summaryChangeValue').className = 'summary-value';
        document.getElementById('summaryChangeNote').textContent = lang.noPreviousSample;
        document.getElementById('summarySamplesValue').textContent = '0';
        document.getElementById('summarySamplesNote').textContent = siteLabel;
        return;
      }

      const latestTime = samples[samples.length - 1].timestamp;
      const latestSamples = samples.filter(item => item.timestamp === latestTime);
      const previousTime = [...new Set(samples.map(item => item.timestamp))].slice(-2, -1)[0];
      const previousSamples = previousTime ? samples.filter(item => item.timestamp === previousTime) : [];
      const latestTotal = sumProblems(latestSamples);
      const previousTotal = previousSamples.length ? sumProblems(previousSamples) : null;
      const delta = previousTotal === null ? null : latestTotal - previousTotal;
      const uniqueProblems = new Set(latestSamples.flatMap(item => item.problems.map(problem => problem.name)));

      document.getElementById('summaryLatestValue').textContent = formatTimestamp(latestTime, timezone);
      document.getElementById('summaryLatestNote').textContent = `${siteLabel} · ${timezone.toUpperCase()}`;
      document.getElementById('summaryTotalValue').textContent = formatNumber(latestTotal);
      document.getElementById('summaryTotalNote').textContent = lang.latestOnlineUsers;
      const changeValue = document.getElementById('summaryChangeValue');
      changeValue.className = 'summary-value';
      if (delta === null) {
        changeValue.textContent = '--';
        document.getElementById('summaryChangeNote').textContent = lang.noPreviousSample;
      } else {
        changeValue.textContent = `${delta >= 0 ? '+' : ''}${formatNumber(delta)}`;
        changeValue.classList.add(delta >= 0 ? 'positive' : 'negative');
        document.getElementById('summaryChangeNote').textContent = lang.vsPreviousSample;
      }
      document.getElementById('summarySamplesValue').textContent = formatNumber(samples.length);
      document.getElementById('summarySamplesNote').textContent = `${uniqueProblems.size} ${lang.trackedProblems}`;
    }

    // 加载数据
    async function loadData() {
      try {
        const response = await fetchFreshJson('data/online_users.json');
        if (!response.ok) {
          throw new Error('Failed to load data');
        }
        return await response.json();
      } catch (error) {
        console.error('Error loading data:', error);
        return [];
      }
    }

    // 聚合数据为天级别（取每天最大值）
    function aggregateDataByDay(data) {
      if (data.length === 0) {
        return [];
      }

      // 按天分组
      const groupedByDay = {};
      data.forEach(item => {
        const date = new Date(item.timestamp);
        const dayKey = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;

        if (!groupedByDay[dayKey]) {
          groupedByDay[dayKey] = {
            timestamp: new Date(dayKey).toISOString(),
            problems: []
          };
        }

        // 合并问题数据，保留每天的最大在线人数
        item.problems.forEach(problem => {
          const existingProblem = groupedByDay[dayKey].problems.find(p => p.name === problem.name);
          if (existingProblem) {
            existingProblem.online_users = Math.max(existingProblem.online_users, problem.online_users);
          } else {
            groupedByDay[dayKey].problems.push({
              name: problem.name,
              url: problem.url,
              online_users: problem.online_users
            });
          }
        });
      });

      // 构建结果数组
      const aggregatedData = Object.values(groupedByDay).map(dayData => {
        return {
          timestamp: dayData.timestamp,
          problems: dayData.problems.map(problem => ({
            name: problem.name,
            url: problem.url,
            online_users: problem.online_users
          }))
        };
      });

      // 按时间排序
      aggregatedData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

      return aggregatedData;
    }

    // 根据站点过滤数据
    function filterDataBySite(data, site) {
      if (site === 'all') {
        return data;
      }
      return data.filter(item => item.site === site);
    }

    // 根据时区转换时间
    function convertTimezone(date, timezone) {
      const options = {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      };

      switch (timezone) {
        case 'utc':
          return date.toLocaleString('en-US', { ...options, timeZone: 'UTC' });
        case 'us':
          return date.toLocaleString('en-US', { ...options, timeZone: 'America/New_York' });
        case 'cn':
          return date.toLocaleString('zh-CN', { ...options, timeZone: 'Asia/Shanghai' });
        case 'local':
        default:
          return date.toLocaleString('zh-CN', options);
      }
    }

    // 时间标签格式由 Chart.js 的 time scale 管理（使用 adapter 进行格式化）

    // 根据时间窗口过滤数据
    function filterDataByTimeWindow(data, days) {
      if (days === 'all') {
        return data;
      }
      
      const daysNum = parseInt(days);
      const cutoffDate = new Date();
      cutoffDate.setDate(cutoffDate.getDate() - daysNum);
      
      return data.filter(item => new Date(item.timestamp) >= cutoffDate);
    }

    // 更新图表
    function updateChart() {
      const site = document.getElementById('site').value;
      const timezone = document.getElementById('timezone').value;
      const timeDimension = document.getElementById('timeDimension').value;
      loadData().then(data => {
        const siteFilteredData = filterDataBySite(data, site);
        drawTrendChart(siteFilteredData, timeDimension, timezone);
      });
    }

    const translations = {
      zh: {
        title: 'LeetCode Indicator',
        description: '通过LeetCode题目在线人数反映程序员市场趋势',
        language: 'Language：',
        site: '站点：',
        siteUS: 'LeetCode US',
        siteCN: 'LeetCode China',
        siteAll: '全部',
        timeWindow: '时间窗口：',
        timezone: '时区：',
        timezoneUTC: 'UTC',
        timezonePT: 'PT (UTC-8)',
        timezoneUTC8: 'UTC+8',
        timeDimension: '时间维度：',
        hourLevel: '小时级别',
        dayLevel: '天级别（最大值）',
        onlineUsers: '在线人数',
        lastUpdated: '最后更新: ',
        chartTitleHour: 'LeetCode题目在线人数趋势 (小时级别)',
        chartTitleDay: 'LeetCode题目在线人数趋势 (天级别最大值)',
        chartXAxisHour: '时间（小时）',
        chartXAxisDay: '日期',
        chartYAxis: '在线人数',
        noData: '暂无数据',
        noDataDetail: '当前筛选条件没有可绘制的题目在线人数。',
        noUsableSamples: '没有可用样本',
        noPreviousSample: '暂无上一条样本',
        latestOnlineUsers: '最新样本在线人数总和',
        vsPreviousSample: '相比上一条样本',
        trackedProblems: '道题目',
        summaryLatest: '最新采集',
        summaryTotal: '在线人数',
        summaryChange: '变化',
        summarySamples: '样本数',
        noTags: '暂无事件',
        resetRange: '重置范围'
        ,
        addEventButton: '添加事件',
        eventPlaceholder: '事件标题',
        chooseDateAlert: '请选择日期/时间'
        ,
        showLess: '收起',
        moreFormat: '+{n} 更多',
        screenshotButton: '保存截图',
        screenshotError: '截屏失败'
      },
      en: {
        title: 'LeetCode Indicator',
        description: 'Reflecting programmer job market trends through LeetCode problem online users',
        language: 'Language: ',
        site: 'Site: ',
        siteUS: 'LeetCode US',
        siteCN: 'LeetCode China',
        siteAll: 'All',
        timeWindow: 'Time Window: ',
        timezone: 'Timezone: ',
        timezoneUTC: 'UTC',
        timezonePT: 'PT (UTC-8)',
        timezoneUTC8: 'UTC+8',
        timeDimension: 'Time Dimension: ',
        hourLevel: 'Hourly',
        dayLevel: 'Daily (Max)',
        onlineUsers: 'Online Users',
        lastUpdated: 'Last Updated: ',
        chartTitleHour: 'LeetCode Problem Online Users Trend (Hourly)',
        chartTitleDay: 'LeetCode Problem Online Users Trend (Daily Max)',
        chartXAxisHour: 'Time (Hour)',
        chartXAxisDay: 'Date',
        chartYAxis: 'Online Users',
        noData: 'No Data Available',
        noDataDetail: 'No drawable problem online-user counts match the current filters.',
        noUsableSamples: 'No usable samples',
        noPreviousSample: 'No previous sample',
        latestOnlineUsers: 'Latest sample total',
        vsPreviousSample: 'Vs previous sample',
        trackedProblems: 'tracked problems',
        summaryLatest: 'Latest',
        summaryTotal: 'Online users',
        summaryChange: 'Change',
        summarySamples: 'Samples',
        noTags: 'No events',
        resetRange: 'Reset Range'
        ,
        addEventButton: 'Add Event',
        eventPlaceholder: 'Event title',
        chooseDateAlert: 'Please choose a date/time'
        ,
        showLess: 'Show less',
          moreFormat: '+{n} more',
          screenshotButton: 'Screenshot',
          screenshotError: 'Screenshot failed'
      }
    };


    // problems metadata will be loaded from data/problems_meta.json
    let problemsMeta = {};

    // initialEvents loaded from data/events.json (used to seed in-memory events)
    let initialEvents = [];
    // current in-memory events (user-added events live here and are NOT persisted)
    let currentEvents = [];
    // whether the events list is expanded to show all
    let eventsExpanded = false;

    async function loadProblemsMeta() {
      try {
        const res = await fetchFreshJson('data/problems_meta.json');
        if (!res.ok) throw new Error('no meta');
        problemsMeta = await res.json();
      } catch (e) {
        problemsMeta = {};
        console.warn('Could not load problems_meta.json, using built-in mapping if any.', e);
      }
    }

    async function loadInitialEvents() {
      try {
        const res = await fetchFreshJson('data/events.json');
        if (!res.ok) throw new Error('no events');
        initialEvents = await res.json();
      } catch (e) {
        initialEvents = [];
        console.warn('Could not load events.json.', e);
      }
      // seed currentEvents from initialEvents (but do not persist user edits)
      currentEvents = (initialEvents || []).slice();
    }

    // Accessors for in-memory events
    function getEvents() {
      return currentEvents || [];
    }

    function setEvents(evs) {
      currentEvents = evs || [];
    }

    function renderEventsUI() {
      const container = document.getElementById('eventsList');
      if (!container) return;
      const events = getEvents();
      const language = document.getElementById('language') ? document.getElementById('language').value : 'en';
      const noTagsText = (translations[language] && translations[language].noTags) || 'No tags';
      if (events.length === 0) {
        container.textContent = noTagsText;
        return;
      }
      // Render as chips with collapse when too many
      const maxVisible = 1;
      container.innerHTML = '';
      const listWrapper = document.createElement('div');
      listWrapper.className = 'events-list';

      const toShow = eventsExpanded ? events : events.slice(0, maxVisible);
      toShow.forEach(ev => {
        const d = new Date(ev.timestamp);
        const timeStr = d.toLocaleString();
        const chip = document.createElement('span');
        chip.className = 'event-chip';
        const time = document.createElement('span');
        time.className = 'chip-time';
        time.textContent = timeStr;
        const title = document.createElement('span');
        title.className = 'chip-title';
        title.textContent = ev.title;
        const deleteButton = document.createElement('button');
        deleteButton.className = 'chip-delete';
        deleteButton.type = 'button';
        deleteButton.textContent = '×';
        deleteButton.onclick = function() { deleteEvent(ev.id); };
        chip.appendChild(time);
        chip.appendChild(title);
        chip.appendChild(deleteButton);
        listWrapper.appendChild(chip);
      });

      if (events.length > maxVisible) {
        const moreCount = eventsExpanded ? 0 : events.length - maxVisible;
        const moreChip = document.createElement('button');
        moreChip.className = 'more-chip';
        const langObj = translations[language] || translations['en'];
        moreChip.textContent = eventsExpanded ? (langObj.showLess || 'Show less') : ((langObj.moreFormat || '+{n} more').replace('{n}', moreCount));
        moreChip.onclick = function() { eventsExpanded = !eventsExpanded; renderEventsUI(); };
        listWrapper.appendChild(moreChip);
      }

      container.appendChild(listWrapper);
    }

    function addEventFromForm() {
      const dt = document.getElementById('eventDatetime').value;
      const title = document.getElementById('eventTitle').value || 'Event';
      const color = '#ff4d4f';
      if (!dt) {
        const language = document.getElementById('language') ? document.getElementById('language').value : 'en';
        alert((translations[language] && translations[language].chooseDateAlert) || 'Please choose a date/time');
        return;
      }
      const iso = new Date(dt).toISOString();
      const events = getEvents();
      const ev = { id: Date.now().toString(), timestamp: iso, title: title, color: color };
      events.push(ev);
      setEvents(events);
      renderEventsUI();
      updateChart();
      document.getElementById('eventTitle').value = '';
    }

    function deleteEvent(id) {
      let events = getEvents();
      events = events.filter(e => e.id !== id);
      setEvents(events);
      renderEventsUI();
      updateChart();
    }

    // One-click screenshot of the main container using html2canvas
    function takeScreenshot() {
      const container = document.querySelector('.container');
      if (!container || typeof html2canvas === 'undefined') {
        const lang = document.getElementById('language') ? document.getElementById('language').value : 'en';
        alert((translations[lang] && translations[lang].screenshotError) || 'Screenshot not available');
        return;
      }
      html2canvas(container, {useCORS: true}).then(canvas => {
        canvas.toBlob(blob => {
          const a = document.createElement('a');
          const now = new Date();
          const pad = n => String(n).padStart(2, '0');
          const fname = `leetcode-indicator-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}.png`;
          a.href = URL.createObjectURL(blob);
          a.download = fname;
          document.body.appendChild(a);
          a.click();
          a.remove();
        }, 'image/png');
      }).catch(err => {
        console.error('Screenshot failed', err);
        const lang = document.getElementById('language') ? document.getElementById('language').value : 'en';
        alert((translations[lang] && translations[lang].screenshotError) || 'Screenshot failed');
      });
    }

    function changeLanguage() {
      const language = document.getElementById('language').value;
      updateUI(language);
      loadData().then(data => {
        const site = document.getElementById('site').value;
        const timezone = document.getElementById('timezone').value;
        const timeDimension = document.getElementById('timeDimension').value;
        const siteFilteredData = filterDataBySite(data, site);
        drawTrendChart(siteFilteredData, timeDimension, timezone);
      });
    }

    function updateUI(language) {
      const lang = translations[language];
      
      document.querySelector('h1').textContent = lang.title;
      document.querySelector('.description').textContent = lang.description;
      document.getElementById('summaryLatestLabel').textContent = lang.summaryLatest;
      document.getElementById('summaryTotalLabel').textContent = lang.summaryTotal;
      document.getElementById('summaryChangeLabel').textContent = lang.summaryChange;
      document.getElementById('summarySamplesLabel').textContent = lang.summarySamples;
      
      document.querySelector('label[for="language"]').textContent = lang.language;
      document.querySelector('label[for="site"]').textContent = lang.site;
      document.querySelector('label[for="timezone"]').textContent = lang.timezone;
      document.querySelector('label[for="timeDimension"]').textContent = lang.timeDimension;
      const resetBtn = document.getElementById('resetRangeBtn');
      if (resetBtn) resetBtn.textContent = lang.resetRange || 'Reset Range';
      
      const siteSelect = document.getElementById('site');
      siteSelect.options[0].text = lang.siteUS;
      siteSelect.options[1].text = lang.siteCN;
      siteSelect.options[2].text = lang.siteAll;
      
      const timezoneSelect = document.getElementById('timezone');
      timezoneSelect.options[0].text = lang.timezoneUTC;
      timezoneSelect.options[1].text = lang.timezonePT;
      timezoneSelect.options[2].text = lang.timezoneUTC8;
      
      const timeDimensionSelect = document.getElementById('timeDimension');
      timeDimensionSelect.options[0].text = lang.hourLevel;
      timeDimensionSelect.options[1].text = lang.dayLevel;

      const addBtn = document.getElementById('addEventBtn');
      if (addBtn) addBtn.textContent = lang.addEventButton || 'Add Event';
      const eventTitleInput = document.getElementById('eventTitle');
      if (eventTitleInput) eventTitleInput.placeholder = lang.eventPlaceholder || 'Event title';
      const ssBtn = document.getElementById('screenshotBtn');
      if (ssBtn) ssBtn.textContent = lang.screenshotButton || 'Screenshot';
      renderEventsUI();
    }

    function drawTrendChart(data, timeDimension, timezone) {
      const mainCanvas = document.getElementById('trendChart');
      const overviewCanvas = document.getElementById('overviewChart');
      const mainCtx = mainCanvas.getContext('2d');
      const overviewCtx = overviewCanvas.getContext('2d');

      const language = document.getElementById('language').value;
      const lang = translations[language];
      updateSummary(data, document.getElementById('site').value, timezone);

      // 根据时间维度处理数据
      let processedData = data;
      if (timeDimension === 'day') {
        processedData = aggregateDataByDay(data);
      }

      // 提取所有问题名称
      const problemNames = getProblemNames(processedData);

      // 销毁旧图表（主图 & 概览图）
      try {
        const existingMain = (mainCanvas && Chart.getChart && Chart.getChart(mainCanvas)) || window.trendChart;
        if (existingMain && typeof existingMain.destroy === 'function') existingMain.destroy();
      } catch (e) {
        console.warn('Could not destroy previous main chart:', e);
      }
      try {
        const existingOverview = (overviewCanvas && Chart.getChart && Chart.getChart(overviewCanvas)) || window.overviewChart;
        if (existingOverview && typeof existingOverview.destroy === 'function') existingOverview.destroy();
      } catch (e) {
        console.warn('Could not destroy previous overview chart:', e);
      }

      if (data.length === 0 || problemNames.length === 0) {
        setChartEmptyState(lang.noData, lang.noDataDetail);
        return;
      }

      setChartEmptyState('', '');

      // 时间刻度单位
      const timeUnit = timeDimension === 'hour' ? 'hour' : 'day';

      // 根据时区转换数据点的时间戳
      function convertTimestampToTimezone(isoString, timezone) {
        const date = new Date(isoString);
        return date.getTime() + getTimezoneOffsetMs(timezone);
      }

      // 为 Chart.js 使用时间轴构建数据点 (x = ISO timestamp, y = value)
      const datasets = problemNames.map((name, index) => {
        const colors = [
          'rgba(255, 99, 132, 1)',
          'rgba(54, 162, 235, 1)',
          'rgba(255, 206, 86, 1)',
          'rgba(75, 192, 192, 1)',
          'rgba(153, 102, 255, 1)'
        ];

        const dataPoints = processedData.map(item => {
          const problem = item.problems.find(p => p.name === name);
          return {
            x: convertTimestampToTimezone(item.timestamp, timezone),
            y: problem ? problem.online_users : null
          };
        });

        const meta = problemsMeta[name] || {};
        const displayName = (language === 'zh' && meta.zh) ? meta.zh : name;
        const label = meta.id ? `${meta.id}. ${displayName}` : displayName;

        return {
          label: label,
          engName: name,
          data: dataPoints,
          borderColor: colors[index % colors.length],
          backgroundColor: colors[index % colors.length].replace('1)', '0.2)'),
          tension: 0.4,
          pointRadius: 2,
          spanGaps: true
        };
      });

      // 创建主图（line，时间轴）
      window.trendChart = new Chart(mainCtx, {
        type: 'line',
        data: {
          datasets: datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            mode: 'index',
            intersect: false,
          },
          plugins: {
                title: {
              display: true,
              text: timeDimension === 'hour' ? lang.chartTitleHour : lang.chartTitleDay
            },
            legend: { position: 'bottom' },
                annotation: {
                  annotations: (function(){
                    const evs = getEvents();
                    const out = {};
                    evs.forEach((ev, idx) => {
                      out['ev' + idx] = {
                        type: 'line',
                        xMin: convertTimestampToTimezone(ev.timestamp, timezone),
                        xMax: convertTimestampToTimezone(ev.timestamp, timezone),
                        borderColor: ev.color || '#ff4d4f',
                        borderWidth:2,
                        label: {
                          enabled: true,
                          content: ev.title,
                          backgroundColor: ev.color || '#ff4d4f',
                          color: '#fff',
                          position: 'start',
                          yAdjust: -10,
                          xAdjust: 6
                        }
                      };
                    });
                    return out;
                  })()
                },
            tooltip: {
              callbacks: {
                label: function(ctx) {
                  const dsLabel = ctx.dataset.label || '';
                  const value = (ctx.parsed && ctx.parsed.y !== undefined) ? ctx.parsed.y : (ctx.raw && ctx.raw.y !== undefined ? ctx.raw.y : '');
                  const lines = [`${dsLabel}: ${value}`];
                  if (language === 'zh' && ctx.dataset && ctx.dataset.engName) {
                    lines.push(`(${ctx.dataset.engName})`);
                  }
                  return lines;
                }
              }
            },
            zoom: {
              pan: { enabled: true, mode: 'x' },
              zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
            }
          },
          scales: {
            y: { beginAtZero: true, title: { display: true, text: lang.chartYAxis } },
            x: {
              type: 'time',
              time: {
                unit: timeUnit,
                displayFormats: {
                  hour: 'MM/dd HH:00',
                  day: 'MM/dd'
                },
                tooltipFormat: timeDimension === 'hour' ? "yyyy-MM-dd HH:mm" : "yyyy-MM-dd"
              },
              title: { display: true, text: timeDimension === 'hour' ? lang.chartXAxisHour : lang.chartXAxisDay },
              grid: { display: true },
              ticks: { source: 'auto', maxRotation: 0, autoSkip: true }
            }
          }
        }
      });

      // 创建概览图（用于选择时间范围，支持拖拽缩放）
      window.overviewChart = new Chart(overviewCtx, {
        type: 'line',
        data: { datasets: datasets.map(ds => ({ ...ds, pointRadius: 0, borderWidth: 1 })) },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          elements: { point: { radius: 0 } },
          plugins: {
            legend: { display: false },
            zoom: {
              pan: {
                enabled: true,
                mode: 'x',
                onPanComplete: ({chart}) => { syncMainFromOverview(chart); }
              },
              zoom: {
                drag: { enabled: true, backgroundColor: 'rgba(0,0,0,0.1)' },
                mode: 'x',
                onZoomComplete: ({chart}) => { syncMainFromOverview(chart); }
              }
            }
          },
          scales: { 
            x: { 
              type: 'time', 
              time: { 
                unit: timeUnit, 
                displayFormats: { 
                  hour: 'MM/dd HH:00', 
                  day: 'MM/dd' 
                }
              }, 
              display: true 
            }, 
            y: { display: false } 
          }
        }
      });

      function syncMainFromOverview(overviewChart) {
        try {
          const xScale = overviewChart.scales.x;
          if (!xScale) return;
          const min = xScale.min;
          const max = xScale.max;
          if (window.trendChart) {
            window.trendChart.options.scales.x.min = min;
            window.trendChart.options.scales.x.max = max;
            window.trendChart.update();
          }
        } catch (e) {
          console.warn('syncMainFromOverview error:', e);
        }
      }

      // 重置范围
      window.resetRange = function() {
        try {
          if (window.trendChart && typeof window.trendChart.resetZoom === 'function') window.trendChart.resetZoom();
          if (window.overviewChart && typeof window.overviewChart.resetZoom === 'function') window.overviewChart.resetZoom();
        } catch (e) {
          console.warn('resetRange error:', e);
        }
      };
    }

    // 初始化页面
    async function init() {
      const language = document.getElementById('language').value;
      updateUI(language);
      // load external metadata and initial events (if any)
      await loadProblemsMeta();
      await loadInitialEvents();
      renderEventsUI();

      const data = await loadData();
      const site = document.getElementById('site').value;
      const timezone = document.getElementById('timezone').value;
      const timeDimension = document.getElementById('timeDimension').value;
      const siteFilteredData = filterDataBySite(data, site);
      drawTrendChart(siteFilteredData, timeDimension, timezone);

      // Pre-fill event datetime input to today's 00:00 local time
      try {
        const dtInput = document.getElementById('eventDatetime');
        if (dtInput) {
          const now = new Date();
          const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
          const pad = (n) => String(n).padStart(2, '0');
          const val = `${midnight.getFullYear()}-${pad(midnight.getMonth()+1)}-${pad(midnight.getDate())}T${pad(midnight.getHours())}:${pad(midnight.getMinutes())}`;
          dtInput.value = val;
        }
      } catch (e) {
        /* ignore */
      }
    }

    // 页面加载完成后初始化
    window.onload = init;
  </script>
</body>
